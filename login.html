<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RAVION</title>
    <link rel="stylesheet" href="CSS/style.css">

    <!-- ==========================================
    PAGE-SPECIFIC STYLES (Internal CSS)
    
    WHY HERE AND NOT IN style.css?
    Because these styles are ONLY for this page.
    The login page has a unique full-screen 
    background layout that no other page uses.
    
    EXAMINER ANSWER: "I used external CSS for 
    shared styles and internal CSS for 
    page-specific styling. This keeps the 
    external file clean and avoids unnecessary 
    rules loading on other pages."
    =========================================== -->
    <style>
        /* Full screen dark background with image */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px 20px;
            background-image: url('Images/gallery1.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Dark overlay over background image */
        .login-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1;
        }

        /* Form card sits above overlay */
        .login-page .form-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 420px;
            border-color: var(--border);
        }

        /* Logo centered above form */
        .form-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-logo img {
            height: 50px;
            margin: 0 auto;
        }

        /* Divider line with "or" text */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            padding: 0 15px;
            font-size: 0.72rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Remember me checkbox row */
        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.8rem;
        }

        .remember-row label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray);
            cursor: pointer;
            font-size: 0.78rem;
        }

        .remember-row input[type="checkbox"] {
            accent-color: var(--gold);
            width: 15px;
            height: 15px;
        }

        .remember-row a {
            color: var(--gold);
            font-size: 0.78rem;
        }

        /* Welcome text */
        .welcome-text {
            text-align: center;
            margin-bottom: 5px;
        }

        .welcome-text h2 {
            font-size: 1.6rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .welcome-text p {
            font-size: 0.82rem;
            color: var(--gray);
            margin: 0 auto;
            max-width: none;
        }
    </style>
</head>

<body>

    <!-- ==========================================
    LOGIN SECTION
    
    Full screen background with dark overlay.
    Centered dark card with:
    - RAVION logo
    - Welcome text
    - Email input
    - Password input
    - Remember me + Forgot password
    - Login button
    - Sign up link
    
    DESIGN PRINCIPLE:
    Login pages on premium sites are MINIMAL.
    Dark background, one centered card, 
    nothing else. No distractions.
    
    The background image creates depth.
    The dark overlay creates focus on the form.
    =========================================== -->

    <section class="login-page">

        <div class="form-card">

            <!-- RAVION Logo centered -->
            <div class="form-logo">
                <img src="Images/Logo.png" alt="RAVION">
            </div>

            <!-- Welcome heading -->
            <div class="welcome-text">
                <h2>Welcome Back</h2>
                <p>Sign in to your RAVION account</p>
            </div>

            <div class="gold-line"></div>
            <br>

            <!-- Login Form 
            action="#" means form doesn't go anywhere
            (no backend server - just design)
            
            EXAMINER ANSWER: "In production, 
            the form action would point to a 
            server-side script that validates 
            credentials. For this project, I 
            focused on the frontend design." -->
             <form action="profile.html" method="get">

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com" 
                        required>
                    <!-- type="email" tells browser 
                    to validate email format
                    required = can't submit empty
                    placeholder = gray hint text -->
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required>
                    <!-- type="password" hides the 
                    characters as dots for security -->
                </div>

                <!-- Remember Me + Forgot Password -->
                <div class="remember-row">
                    <label>
                        <input type="checkbox" name="remember">
                        Remember me
                    </label>
                    <a href="forgot-password.html">Forgot Password?</a>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-gold btn-full">
                    Sign In
                </button>

            </form>

            <!-- Divider -->
            <div class="divider">
                <span>or</span>
            </div>

            <!-- Sign Up Link -->
            <div class="form-links">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>

        </div>

    </section>


    <!-- ==========================================
    NOTE: No footer on login page!
    
    WHY? Premium login pages are CLEAN.
    Just the form. Nothing else.
    No footer distracting from the action.
    
    This is a DESIGN CHOICE. 
    Many premium brands do this:
    - Apple login: no footer
    - Nike login: minimal footer
    - Gucci login: no footer
    
    EXAMINER ANSWER: "I intentionally removed 
    the footer from auth pages (login, signup, 
    forgot password) to maintain a clean, 
    focused user experience. This is a common 
    UX pattern in premium brand websites."
    =========================================== -->

</body>
