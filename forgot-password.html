<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - RAVION</title>
    <link rel="stylesheet" href="CSS/style.css">

    <!-- ==========================================
    PAGE-SPECIFIC STYLES
    - Uses gallery4.jpg as background
    - Very minimal card: logo, heading, input, 
      button, and back-to-login link.
    =========================================== -->
    <style>
        .forgot-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px 20px;
            background-image: url('Images/gallery4.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .forgot-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1;
        }

        .forgot-page .form-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
        }

        .form-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-logo img {
            height: 50px;
            margin: 0 auto;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 20px;
        }

        .welcome-text h2 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .welcome-text p {
            font-size: 0.8rem;
            color: var(--gray);
            margin: 0 auto;
            max-width: 300px;
        }
    </style>
</head>

<body>

    <!-- ==========================================
    NAVIGATION BAR (Same)
    =========================================== -->
    <input type="checkbox" id="menu-checkbox">
    <nav class="navbar">
        <div class="container">
            <a href="Index.html" class="logo"><img src="Images/Logo.png" alt="RAVION"></a>
            <ul class="nav-links">
                <li><a href="Index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="pricing.html">Membership</a></li>
                <li><a href="team.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-icons">
                <a href="search.html">&#x1F50D;</a>
                <a href="wishlist.html">&#x2661;</a>
                <a href="cart.html">&#x1F6D2;</a>
                <a href="login.html">&#x263A;</a>
                <label for="menu-checkbox" class="menu-toggle">&#9776;</label>
            </div>
        </div>
    </nav>

    <!-- Mobile Menu -->
    <div class="mobile-menu">
        <a href="Index.html">Home</a>
        <a href="products.html">Shop</a>
        <a href="gallery.html">Gallery</a>
        <a href="pricing.html">Membership</a>
        <a href="team.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </div>

    <!-- ==========================================
    FORGOT PASSWORD SECTION
    
    Very simple flow:
    1. User enters email
    2. Click "Send Reset Link"
    3. Back to Login link
    
    EXAMINER TIP: "I included a forgot password 
    flow because user authentication requires 
    account recovery paths for better security."
    =========================================== -->

    <section class="forgot-page">

        <div class="form-card">
            
            <div class="form-logo">
                <img src="Images/Logo.png" alt="RAVION">
            </div>

            <div class="welcome-text">
                <h2>Reset Password</h2>
                <p>Enter your email to receive a password reset link.</p>
            </div>

            <div class="gold-line"></div>
            <br>

            <form action="#" method="post">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <button type="submit" class="btn btn-gold btn-full">
                    Send Reset Link
                </button>
            </form>

            <div class="form-links">
                <p><a href="login.html">← Back to Login</a></p>
            </div>

        </div>

    </section>

</body>
</html>
